name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin the fmri-defaults-kb sibling checkout for reproducible CI (its editable
  # path contents aren't captured by uv.lock). Bump this SHA when this repo needs
  # newer KB contents.
  KB_REF: c92cb93d3a2a1bf30353d5211db217c5c08c4a22

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: fmri-repro-agent
      # Sibling path dependency: uv.sources maps fmri-defaults-kb to
      # ../fmri-defaults-kb, so it must be checked out next to the main repo for
      # `uv sync --frozen` to resolve the editable path in CI.
      - uses: actions/checkout@v6
        with:
          repository: jae7cho/fmri-defaults-kb
          path: fmri-defaults-kb
          ref: ${{ env.KB_REF }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: fmri-repro-agent/uv.lock
      - name: Install dependencies
        working-directory: fmri-repro-agent
        run: uv sync --all-extras --frozen
      - name: Ruff lint
        working-directory: fmri-repro-agent
        run: uv run ruff check .
      - name: Ruff format check
        working-directory: fmri-repro-agent
        run: uv run ruff format --check .
      - name: Mypy
        working-directory: fmri-repro-agent
        run: uv run mypy src
      - name: Pytest
        working-directory: fmri-repro-agent
        run: uv run pytest --cov=fmri_repro --cov-report=term-missing --cov-fail-under=95

  extractor-mvp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: fmri-repro-agent
      # extractor_mvp depends on fmri-repro-agent (path=..) which depends on
      # fmri-defaults-kb (path=../../fmri-defaults-kb); check out the sibling so
      # the editable path chain resolves.
      - uses: actions/checkout@v6
        with:
          repository: jae7cho/fmri-defaults-kb
          path: fmri-defaults-kb
          ref: ${{ env.KB_REF }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: fmri-repro-agent/extractor_mvp/uv.lock
      - name: Install dependencies
        working-directory: fmri-repro-agent/extractor_mvp
        run: uv sync --all-extras --frozen
      - name: Ruff lint
        working-directory: fmri-repro-agent/extractor_mvp
        run: uv run ruff check .
      - name: Ruff format check
        working-directory: fmri-repro-agent/extractor_mvp
        run: uv run ruff format --check .
      - name: Mypy
        working-directory: fmri-repro-agent/extractor_mvp
        run: uv run mypy src
      # Offline suite only; @live tests need Bedrock/AWS creds not present in CI.
      - name: Pytest (offline)
        working-directory: fmri-repro-agent/extractor_mvp
        run: uv run pytest -m "not live" --cov=extractor_mvp --cov-report=term-missing --cov-fail-under=70
