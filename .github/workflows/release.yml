# Zenodo DOIs are minted automatically via Zenodo's GitHub integration when a
# Release is published. No workflow logic needed for that — configure on
# https://zenodo.org/account/settings/github/ .
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Build distribution
        run: uv build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
